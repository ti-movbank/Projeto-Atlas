        <section class="overview">
            <h2>O que é o Honcho?</h2>
            <p>O Honcho é o sistema de memória de longo prazo integrado ao Hermes Agent, responsável por construir e manter um perfil dinâmico tanto do usuário quanto do próprio assistente ao longo de múltiplas sessões. Ele opera como uma camada de conhecimento contextual que melhora a personalização e reduz a necessidade de reexplicação de preferências.</p>
        </section>

                </div>

                </div>

                </div>

        <section class="patterns">
            <h2>🔍 Padrões Observados (Aprendizado Indutivo)</h2>
            <div class="pattern">
                <h3>🏢 Mentalidade de Propriedade Técnica</h3>
                <p>Você prefere gerenciar a infraestrutura do AI (CLI configuration, systemd management, model selection) em vez de delegar decisões de sistema. Isso é evidenciado pela sua configuração pessoal do Honcho via CLI e preferência por <code>hermes config set</code> em vez de edição direta do <code>config.yaml</code>.</p>
            </div>
            <div class="pattern">
                <h3>🔒 Modelo de Confiança em Níveis</h3>
                <p>Você autoriza respostas automáticas apenas para e-mails de <code>alcides@movbank.com.br</code> quando claramente dirigidos ao assistente, exigindo confirmação explícita para qualquer ação externa sensível (envio de e-mail, modificação de arquivos, alterações de acesso).</p>
            </div>
            <div class="pattern">
                <h3>💻 Preferência por Soluções Locais/Nativas</h3>
                <p>Para tarefas críticas como renderização de 2FA do Google Meet, você prefere <code>xvfb + Chromium local</code> (Playwright, headless:false) em vez de soluções headless pura como Browserbase, que resulta em página branca durante o fluxo de 2FA.</p>
            </div>
            <div class="pattern">
                <h3>📋 Higiene de Dados e Minimalismo Estrutural</h3>
                <p>Você mantém arquivos <code>MEMORY.md</code> e <code>USER.md</code> minimalistas, contendo apenas informações essenciais operacionais, e prefere estrutura HTML limpa sem seções duplicadas ao gerar conteúdo dinâmico.</p>
            </div>
            <div class="pattern">
                <h3>⏰ Agendamento de Tarefas em Horários Estratégicos</h3>
                <p>Você estrutura tarefas em background (backups, atualização de notícias fiscais) para ocorrerem nas primeiras horas da manhã (02:00 e 06:00 Brasília), garantindo que manutenção e agregação de dados sejam concluídas antes do expediente.</p>
            </div>
        </section>

        <section class="how-it-works">
            <h2>🔄 Como Funciona na Prática</h2>
            <ol>
                <li><strong>Observação:</strong> Durante cada conversa, o Honcho coleta fatos explícitos (identidade, preferências, regras) e infere padrões comportamentais ao longo do tempo.</li>
                <li><strong>Armazenamento:</strong> As informações são salvas como "conclusões" persistentes na memória de longo prazo, construindo um perfil rico tanto para você quanto para o assistente.</li>
                <li><strong>Recuperação:</strong> Em novas sessões, o Honcho fornece contexto relevante automaticamente – seja através de um perfil resumido (<code>honcho_profile</code>), busca de excerpts brutos (<code>honcho_search</code>) ou respostas sintetizadas (<code>honcho_reasoning</code>).</li>
                <li><strong>Integração:</strong> Este contexto é usado para personalizar respostas, evitar loops de confirmação desnecessários e antecipar suas necessidades com base no comportamento observado.</li>
            </ol>
        </section>

        <section class="benefits">
            <h2>✅ Benefícios para o Seu Fluxo de Trabalho</h2>
            <ul>
                <li><strong>Redução de Repetição:</strong> Não precisa explicar suas preferências de comunicação, modelo ou fluxo de trabalho a cada nova sessão.</li>
                <li><strong>Personalização Dinâmica:</strong> O assistente adapta seu tom, nível de detalhe e abordagem com base no que aprendeu sobre você.</li>
                <li><strong>Eficiência Operacional:</strong> Reduz necessidade de confirmações externas para ações que você já autorizou previamente (ex.: e-mails de <code>alcides@movbank.com.br</code>).</li>
                <li><strong>Transparência:</strong> Você pode inspecionar exatamente o que foi aprendido sobre você através das ferramentas de introspecção do Honcho.</li>
                <li><strong>Integração Suave:</strong> Funciona em conjunto com seu sistema de memória baseado em arquivos (<code>MEMORY.md</code>/<code>USER.md</code>) e referência no Notion, criando uma camada de conhecimento abrangente.</li>
            </ul>
        </section>
